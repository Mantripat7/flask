{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<form class="row g-3" method="post" enctype="multipart/form-data">
  <div class="col-md-6">
    <label for="inputEmail4" class="form-label">Name</label>
    <input type="text" class="form-control" name="name">
  </div>
  <div class="col-md-6">
    <label for="inputEmail4" class="form-label">Email</label>
    <input type="email" class="form-control" name="email">
  </div>
<div class="col-md-6">
    <label for="inputZip" class="form-label">Date of Birth </label>
    <input type="date" class="form-control" name="dob">
  </div>
  <div class="col-md-6">
    <label for="inputPassword4" class="form-label">Marks</label>
    <input type="number" class="form-control" name="marks" step="0.01">
  </div>
  <div class="col-12">
    <label for="inputAddress" class="form-label">Address</label>
    <input type="text" class="form-control" name="address" placeholder="1234 Main St">
  </div>
  
  <div class="col-md-6">
    <label for="inputCity" class="form-label">Profile Pic</label>
    <input type="file" class="form-control" name="profile_pic">
  </div>
  <div class="col-md-6">
    <label for="inputCity" class="form-label">Resume</label>
    <input type="file" class="form-control" name="resume" accept=".pdf,.doc,.docx">
  </div>
 

  <div class="col-12">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="is_active">
      <label class="form-check-label" for="gridCheck">
        Active
      </label>
    </div>
  </div>
  <div class="col-12">
    <button type="submit" class="btn btn-primary">Sign in</button>
  </div>
</form>

</div>


{% endblock %}
